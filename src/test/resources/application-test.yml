spring:
  datasource:
    url: jdbc:h2:mem:users;MODE=PostgreSQL;DATABASE_TO_UPPER=false;INIT=CREATE SCHEMA IF NOT EXISTS users
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: USERS
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}

jwt:
  secret: test-secret-key-that-is-long-enough-for-hs256-signing
  expiration: 3600000
  refresh-expiration: 86400000

app:
  cookie:
    secure: false

INTERNAL_AUTH_TOKEN: test-token
