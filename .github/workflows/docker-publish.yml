name: Publish Docker Image

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  publish:
    uses: Sergio-Smirnoff/financial-app/.github/workflows/backend-publish.yml@master
    permissions:
      contents: read
      packages: write
    with:
      module: ms-users
      version: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
